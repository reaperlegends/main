<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УЕТ Калькулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .rate {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .card {
            background: #15151f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
        }

        .service {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }

        .service:hover {
            background: rgba(255,255,255,0.02);
        }

        .service:last-child {
            border-bottom: none;
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            font-size: 1rem;
        }

        .name {
            font-size: 0.9rem;
            color: #e2e8f0;
            font-weight: 500;
        }

        .rate-badge {
            font-size: 0.7rem;
            color: #6366f1;
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            width: 70px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: #475569;
        }

        .result {
            min-width: 80px;
            text-align: right;
            font-size: 0.85rem;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
        }

        .total-card {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            text-align: center;
        }

        .total-row {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .total-item h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .total-item .value {
            font-size: 2rem;
            font-weight: 700;
        }

        .breakdown {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.8rem;
            max-height: 120px;
            overflow-y: auto;
        }

        .break-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            body { padding: 20px 16px; }
            .name { font-size: 0.85rem; }
            input { width: 60px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>УЕТ Калькулятор</h1>
            <div class="rate">1 УЕТ = 3000 ₽</div>
        </div>

        <div class="card" id="services"></div>

        <div class="total-card">
            <div class="total-row">
                <div class="total-item">
                    <h3>Всего УЕТ</h3>
                    <div class="value" id="totalUet">0</div>
                </div>
                <div class="total-item">
                    <h3>Рублей</h3>
                    <div class="value" id="totalRub">0</div>
                </div>
            </div>
            <div class="breakdown" id="breakdown"></div>
        </div>
    </div>

    <script>
        const RATE = 3000;
        
        const services = [
            { id: 'tabletki', name: 'Таблетки', icon: '💊', uet: 0.2 },
            { id: 'pmp', name: 'ПМП', icon: '🩺', uet: 0.9 },
            { id: 'postavka', name: 'Поставка', icon: '📦', uet: 8 },
            { id: 'mp', name: 'МП', icon: '🏥', uet: 8 },
            { id: 'gmp', name: 'ГМП', icon: '🚑', uet: 1 },
            { id: 'medbook', name: 'Мед. книжка', icon: '📚', uet: 2 },
            { id: 'narko', name: 'Справка нарколога', icon: '🧪', uet: 2.5 },
            { id: 'trud', name: 'Трудоустройство', icon: '👤', uet: 2 },
            { id: 'map', name: 'МАП', icon: '🚌', uet: 6 },
            { id: 'proverka_gos', name: 'Проверка гос.структур', icon: '🔍', uet: 8 },
            { id: 'vnutr_proverka', name: 'Внутр. проверка', icon: '📋', uet: 1.5 },
            { id: 'lekcia', name: 'Лекция', icon: '🎓', uet: 1.8 },
            { id: 'ekzamen', name: 'Экзамен', icon: '📝', uet: 1.9 },
            { id: 'dezhurstvo', name: 'Дежурство (15 мин)', icon: '⏰', uet: 4.5 },
            { id: 'rp', name: 'RP-ситуация', icon: '🎭', uet: 1 },
            { id: 'nabor', name: 'Набор (безрезультат.)', icon: '📢', uet: 5 }
        ];

        function render() {
            const container = document.getElementById('services');
            container.innerHTML = services.map(s => `
                <div class="service">
                    <div class="service-info">
                        <div class="icon">${s.icon}</div>
                        <div>
                            <div class="name">${s.name}</div>
                        </div>
                    </div>
                    <div class="input-wrap">
                        <span class="rate-badge">${s.uet}</span>
                        <input type="number" id="${s.id}" placeholder="0" min="0" oninput="calc()">
                        <div class="result" id="res-${s.id}"></div>
                    </div>
                </div>
            `).join('');
        }

        function fmt(n) {
            return n.toLocaleString('ru-RU', { maximumFractionDigits: 1 });
        }

        function calc() {
            let totalUet = 0;
            let breakdown = [];
            
            services.forEach(s => {
                const qty = parseFloat(document.getElementById(s.id).value) || 0;
                const uet = qty * s.uet;
                const rub = uet * RATE;
                totalUet += uet;
                
                const resEl = document.getElementById(`res-${s.id}`);
                if (qty > 0) {
                    resEl.textContent = fmt(rub) + ' ₽';
                    breakdown.push(`${s.icon} ${qty}×${s.uet}=${fmt(uet)}`);
                } else {
                    resEl.textContent = '';
                }
            });
            
            document.getElementById('totalUet').textContent = fmt(totalUet);
            document.getElementById('totalRub').textContent = fmt(totalUet * RATE);
            document.getElementById('breakdown').innerHTML = breakdown.length 
                ? breakdown.map(b => `<div class="break-item">${b}</div>`).join('')
                : '<div class="break-item" style="opacity:0.5">Введите данные</div>';
        }

        render();
        calc();
    </script>
</body>
</html>
