<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>УЕТ Калькулятор — ЦГБ №7</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --card:#15151f;
  --border:rgba(255,255,255,0.06);
  --accent1:#6366f1;
  --accent2:#8b5cf6;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:'Inter',system-ui,sans-serif;
  color:#fff;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
header{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:20px;
}
h1{
  margin:0;
  font-size:24px;
}
.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  font-size:14px;
  font-weight:600;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:15px;
}
.table{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.row{
  display:grid;
  grid-template-columns: 1.5fr 0.7fr 100px 1fr;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  transition:0.2s;
}
.row:hover{
  background:rgba(255,255,255,0.03);
}
.service-name{
  display:flex;
  align-items:center;
  gap:8px;
}
.uet-badge{
  background:rgba(139,92,246,0.15);
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}
input[type=number]{
  width:100%;
  padding:6px 8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0f0f17;
  color:#fff;
  transition:0.2s;
}
input[type=number]:focus{
  outline:none;
  border-color:var(--accent1);
  box-shadow:0 0 0 2px rgba(99,102,241,0.3);
}
.result{
  text-align:right;
  font-weight:600;
}
.summary{
  margin-top:20px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  border-radius:16px;
  padding:20px;
}
.summary h2{
  margin:0 0 10px 0;
}
.summary .big{
  font-size:28px;
  font-weight:700;
}
button{
  cursor:pointer;
  border:none;
  border-radius:12px;
  padding:10px 16px;
  font-weight:600;
  transition:0.2s;
}
.copy-btn{
  background:#fff;
  color:#000;
}
.copy-btn:hover{opacity:0.9}
.reset-btn{
  background:#222;
  color:#fff;
  border:1px solid var(--border);
}
details{
  margin-top:15px;
}
details div{
  margin-top:10px;
  font-size:14px;
}
@media(max-width:480px){
  .row{
    grid-template-columns:1fr;
  }
  .result{text-align:left}
}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🏥 УЕТ Калькулятор — ЦГБ №7</h1>
<span class="badge">1 УЕТ = 3000 ₽</span>
</header>

<div class="card table" id="services"></div>

<div class="summary">
<h2>Итог</h2>
<div class="big" id="totalUet">0 УЕТ</div>
<div class="big" id="totalRub">0 ₽</div>
<br>
<button class="copy-btn" onclick="copyResult()">Скопировать результат</button>
<button class="reset-btn" onclick="resetAll()">Сбросить всё</button>
<div id="datetime" style="margin-top:10px;font-size:13px;"></div>

<details>
<summary>Детализация</summary>
<div id="detailsList"></div>
</details>
</div>
</div>

<script>
const RATE=3000;
const services=[
["💊","Таблетки",0.2],
["🚑","ПМП",0.9],
["📦","Поставка",8],
["🏥","МП",8],
["🩺","ГМП",1],
["📘","Мед. книжка",2],
["🚓","Справка от нарколога",2.5],
["💼","Трудоустройство",2],
["📊","МАП",6],
["🏛","Проверка гос.структур",8],
["🔎","Внутр. проверка",1.5],
["🎓","Лекция",1.8],
["📝","Экзамен",1.9],
["⏰","Дежурство (15 мин)",4.5],
["🎭","RP-ситуация",1],
["❌","Набор (безрезультативный)",5]
];

const container=document.getElementById("services");

services.forEach((s,i)=>{
  const row=document.createElement("div");
  row.className="row";
  row.innerHTML=`
  <div class="service-name">${s[0]} ${s[1]} <span class="uet-badge">${s[2]} УЕТ</span></div>
  <div></div>
  <input type="number" min="0" value="${localStorage.getItem('q'+i)||0}" oninput="update()">
  <div class="result" id="r${i}">0 ₽</div>
  `;
  container.appendChild(row);
});

function format(n){
  return n.toLocaleString('ru-RU');
}

function animateValue(el,start,end){
  const duration=200;
  const startTime=performance.now();
  function updateAnim(currentTime){
    const progress=Math.min((currentTime-startTime)/duration,1);
    const value=start+(end-start)*progress;
    el.textContent=value;
    if(progress<1)requestAnimationFrame(updateAnim);
  }
  requestAnimationFrame(updateAnim);
}

function update(){
  let totalUet=0;
  let details="";
  document.querySelectorAll(".row").forEach((row,i)=>{
    const qty=Math.max(0,parseFloat(row.querySelector("input").value)||0);
    localStorage.setItem('q'+i,qty);
    const uet=qty*services[i][2];
    const rub=uet*RATE;
    if(qty>0){
      details+=`${services[i][0]} ${services[i][1]}: ${qty} × ${services[i][2]} = ${uet} УЕТ = ${format(rub)} ₽<br>`;
    }
    row.querySelector(".result").textContent=format(rub)+" ₽";
    totalUet+=uet;
  });
  const totalRub=totalUet*RATE;
  animateValue(document.getElementById("totalUet"),0, totalUet.toFixed(2)+" УЕТ");
  document.getElementById("totalUet").textContent=totalUet.toFixed(2)+" УЕТ";
  document.getElementById("totalRub").textContent=format(totalRub)+" ₽";
  document.getElementById("detailsList").innerHTML=details||"Нет данных";
  document.getElementById("datetime").textContent="Расчёт: "+new Date().toLocaleString();
}

function copyResult(){
  const text=`Итог: ${document.getElementById("totalUet").textContent} | ${document.getElementById("totalRub").textContent}`;
  navigator.clipboard.writeText(text);
  alert("Скопировано!");
}

function resetAll(){
  localStorage.clear();
  document.querySelectorAll("input").forEach(i=>i.value=0);
  update();
}

update();
</script>
</body>
</html>
